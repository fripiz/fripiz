<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fripiz – Annonce</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F7F5F2; color: #1A1A1A; }
    header {
      background: white; padding: 16px 20px;
      display: flex; align-items: center;
      gap: 12px; border-bottom: 1px solid #eee;
      position: sticky; top: 0; z-index: 100;
    }
    .btn-retour { background: none; border: none; font-size: 22px; cursor: pointer; }
    .page-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }

    .carousel {
      position: relative; width: 100%;
      aspect-ratio: 1; background: #F0EDE8;
      overflow: hidden;
    }
    .carousel-track {
      display: flex; height: 100%;
      transition: transform 0.3s ease;
    }
    .carousel-slide {
      min-width: 100%; height: 100%;
      display: flex; align-items: center;
      justify-content: center; font-size: 100px;
      flex-shrink: 0;
    }
    .carousel-slide img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .carousel-btn {
      position: absolute; top: 50%;
      transform: translateY(-50%);
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.9);
      border: none; border-radius: 50%;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }
    .carousel-dots {
      position: absolute; bottom: 10px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: rgba(255,255,255,0.5);
      transition: background 0.2s;
    }
    .dot.active { background: white; }
    .carousel-count {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.5); color: white;
      font-size: 11px; padding: 3px 8px; border-radius: 10px;
    }
    .btn-fav-detail {
      position: absolute; top: 10px; left: 10px;
      background: rgba(255,255,255,0.9);
      border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 20px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    .annonce-body { padding: 20px 16px 140px; }
    .annonce-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 8px;
    }
    .annonce-titre { font-size: 20px; font-weight: 700; flex: 1; }
    .annonce-prix { font-size: 26px; font-weight: 700; color: #FF5C35; margin-left: 12px; }
    .annonce-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tag {
      background: #F0EDE8; border-radius: 20px;
      padding: 5px 12px; font-size: 12px; color: #666;
    }
    .vendeur-card {
      background: white; border-radius: 14px;
      padding: 14px 16px; margin-bottom: 16px;
      border: 1px solid #eee;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer;
    }
    .vendeur-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #FF5C35; color: white;
      display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      font-weight: 700; flex-shrink: 0;
    }
    .vendeur-nom { font-size: 15px; font-weight: 600; }
    .vendeur-note { font-size: 12px; color: #999; }
    .section-titre { font-size: 15px; font-weight: 700; margin-bottom: 8px; margin-top: 16px; }
    .annonce-desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 16px; }
    .infos-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-bottom: 16px;
    }
    .info-item {
      background: white; border-radius: 12px;
      padding: 12px; border: 1px solid #eee;
    }
    .info-label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .info-val { font-size: 14px; font-weight: 600; }

    .btn-signaler {
      width: 100%; background: none; border: none;
      color: #bbb; font-size: 12px; cursor: pointer;
      padding: 8px; text-align: center;
      margin-bottom: 8px;
    }
    .btn-signaler:hover { color: #C0392B; }

    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #eee;
      padding: 12px 16px 28px;
      display: flex; gap: 10px;
    }
    .btn-offre {
      flex: 1; background: white;
      border: 1.5px solid #FF5C35;
      color: #FF5C35; border-radius: 12px;
      padding: 14px; font-size: 14px;
      font-weight: 600; cursor: pointer;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-acheter {
      flex: 2; background: #FF5C35;
      color: white; border: none;
      border-radius: 12px; padding: 14px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'Segoe UI', sans-serif;
    }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 500px;
      padding: 20px 20px 40px;
    }
    .modal-handle {
      width: 36px; height: 4px; background: #E0E0E0;
      border-radius: 2px; margin: 0 auto 16px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: #999; margin-bottom: 20px; }
    .prix-actuel { text-align: center; margin-bottom: 16px; }
    .prix-actuel span { font-size: 13px; color: #999; }
    .prix-actuel strong { font-size: 24px; color: #FF5C35; display: block; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: #999; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%; border: 1.5px solid #ddd;
      border-radius: 12px; padding: 12px 16px;
      font-size: 15px; outline: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-input:focus { border-color: #FF5C35; }
    .form-input-grand {
      width: 100%; border: 1.5px solid #ddd;
      border-radius: 12px; padding: 12px 16px;
      font-size: 18px; font-weight: 700;
      outline: none; text-align: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-input-grand:focus { border-color: #FF5C35; }
    .form-select {
      width: 100%; border: 1.5px solid #ddd;
      border-radius: 12px; padding: 12px 16px;
      font-size: 14px; background: white; outline: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-envoyer {
      width: 100%; background: #FF5C35; color: white;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-envoyer:disabled { opacity: 0.6; }
    .btn-envoyer.danger { background: #C0392B; }

    .offres-recues {
      background: white; border-radius: 14px;
      border: 1px solid #eee; overflow: hidden; margin-bottom: 16px;
    }
    .offre-item {
      padding: 12px 16px; border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
    }
    .offre-item:last-child { border-bottom: none; }
    .offre-info { flex: 1; }
    .offre-acheteur { font-size: 13px; font-weight: 600; }
    .offre-prix { font-size: 16px; font-weight: 700; color: #FF5C35; }
    .offre-statut {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; font-weight: 600;
    }
    .statut-attente { background: #FFF4E5; color: #9A5C00; }
    .statut-accepte { background: #E8F8EE; color: #1A7A40; }
    .statut-refuse { background: #FEE8E8; color: #C0392B; }
    .offre-actions { display: flex; gap: 6px; margin-top: 6px; }
    .btn-accepter {
      background: #E8F8EE; color: #1A7A40;
      border: none; border-radius: 8px;
      padding: 5px 10px; font-size: 11px;
      font-weight: 600; cursor: pointer;
    }
    .btn-refuser {
      background: #FEE8E8; color: #C0392B;
      border: none; border-radius: 8px;
      padding: 5px 10px; font-size: 11px;
      font-weight: 600; cursor: pointer;
    }

    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A; color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; display: none; z-index: 300;
      white-space: nowrap;
    }
    .toast.show { display: block; }
    .loading { text-align: center; padding: 60px 20px; color: #999; }

    /* MODAL SIGNALEMENT */
    .raisons-grid {
      display: flex; flex-direction: column; gap: 8px;
      margin-bottom: 16px;
    }
    .raison-btn {
      padding: 12px 16px; background: #F7F5F2;
      border: 1.5px solid #eee; border-radius: 12px;
      font-size: 14px; cursor: pointer; text-align: left;
      font-family: 'Segoe UI', sans-serif;
      transition: all 0.15s;
    }
    .raison-btn:hover { border-color: #FF5C35; background: #FFF0ED; color: #FF5C35; }
    .raison-btn.selected { border-color: #FF5C35; background: #FFF0ED; color: #FF5C35; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <button class="btn-retour" onclick="history.back()">←</button>
    <div class="page-title">Annonce</div>
    <div style="width:32px"></div>
  </header>

  <div id="contenu">
    <div class="loading">Chargement...</div>
  </div>

  <!-- MODAL OFFRE -->
  <div class="modal-overlay" id="modal-offre" onclick="fermerModal(event,'modal-offre')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Faire une offre</div>
      <div class="modal-sub">Le vendeur recevra ta proposition et pourra l'accepter ou la refuser</div>
      <div class="prix-actuel">
        <span>Prix demandé</span>
        <strong id="prix-demande"></strong>
      </div>
      <div class="form-group">
        <label class="form-label">Ton offre (€)</label>
        <input class="form-input-grand" id="offre-input" type="number" placeholder="0" />
      </div>
      <button class="btn-envoyer" id="btn-offre" onclick="envoyerOffre()">
        Envoyer mon offre →
      </button>
    </div>
  </div>

  <!-- MODAL SIGNALEMENT -->
  <div class="modal-overlay" id="modal-signal" onclick="fermerModal(event,'modal-signal')">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">🚨 Signaler cette annonce</div>
      <div class="modal-sub">Aide-nous à maintenir Fripiz sûr pour tous</div>
      <div class="raisons-grid" id="raisons-grid">
        <button class="raison-btn" onclick="selectionnerRaison(this,'Contrefaçon suspectée')">🏷️ Contrefaçon suspectée</button>
        <button class="raison-btn" onclick="selectionnerRaison(this,'Article inapproprié')">🚫 Article inapproprié</button>
        <button class="raison-btn" onclick="selectionnerRaison(this,'Prix frauduleux')">💰 Prix frauduleux</button>
        <button class="raison-btn" onclick="selectionnerRaison(this,'Photos volées')">📷 Photos volées</button>
        <button class="raison-btn" onclick="selectionnerRaison(this,'Vendeur suspect')">👤 Vendeur suspect</button>
        <button class="raison-btn" onclick="selectionnerRaison(this,'Autre')">❓ Autre raison</button>
      </div>
      <div class="form-group">
        <label class="form-label">Description (optionnel)</label>
        <textarea class="form-input" id="signal-desc" rows="3"
          placeholder="Donne plus de détails si nécessaire..."></textarea>
      </div>
      <button class="btn-envoyer danger" id="btn-signal" onclick="envoyerSignalement()">
        🚨 Envoyer le signalement
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://milpcxrfvufgqyukjyep.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbHBjeHJmdnVmZ3F5dWtqeWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODk3NzgsImV4cCI6MjA5MjI2NTc3OH0.TUh3kxzmjlQX38naPqQvJ6hpyNzPbi1fUoILuXKDZ9Q'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    const emojis = {
      'Femme': '👗', 'Homme': '👔', 'Enfant': '🧒',
      'Bibelots': '🏺', 'Sport': '⚽', 'Chaussures': '👟'
    }

    let annonce = null
    let monPrenom = null
    let estVendeur = false
    let photoIndex = 0
    let photos = []
    let raisonSelectionnee = null

    async function init() {
      const params = new URLSearchParams(window.location.search)
      const id = params.get('id')
      if (!id) { window.location.href = 'index.html'; return }

      const { data: { user } } = await db.auth.getUser()
      if (user) monPrenom = user.user_metadata?.prenom || null

      const { data, error } = await db
        .from('Annonces').select('*').eq('id', id).single()

      if (error || !data) {
        document.getElementById('contenu').innerHTML =
          '<div class="loading">Annonce introuvable 😕</div>'
        return
      }

      annonce = data
      estVendeur = monPrenom && monPrenom === annonce.vendeur
      photos = (annonce.photos && annonce.photos.length > 0)
        ? annonce.photos
        : (annonce.photo ? [annonce.photo] : [])

      afficherAnnonce()
      if (estVendeur) chargerOffres()
    }

    async function afficherAnnonce() {
      const favori = await verifierFavori()

      const carouselHTML = photos.length > 0 ? `
        <div class="carousel">
          <div class="carousel-track" id="carousel-track">
            ${photos.map(p => `
              <div class="carousel-slide">
                <img src="${p}" alt="${annonce.titre}" />
              </div>
            `).join('')}
          </div>
          ${photos.length > 1 ? `
            <button class="carousel-btn prev" onclick="changerPhoto(-1)">◀</button>
            <button class="carousel-btn next" onclick="changerPhoto(1)">▶</button>
            <div class="carousel-dots" id="carousel-dots">
              ${photos.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}"></div>`).join('')}
            </div>
            <div class="carousel-count" id="carousel-count">1 / ${photos.length}</div>
          ` : ''}
          <button class="btn-fav-detail" id="btn-fav" onclick="toggleFavori()">
            ${favori ? '❤️' : '🤍'}
          </button>
        </div>
      ` : `
        <div class="carousel" style="display:flex;align-items:center;justify-content:center;font-size:100px;position:relative;">
          ${annonce.emoji || emojis[annonce.categorie] || '📦'}
          <button class="btn-fav-detail" id="btn-fav" onclick="toggleFavori()">
            ${favori ? '❤️' : '🤍'}
          </button>
        </div>
      `

      document.getElementById('contenu').innerHTML = `
        ${carouselHTML}
        <div class="annonce-body">
          <div class="annonce-top">
            <div class="annonce-titre">${annonce.titre}</div>
            <div class="annonce-prix">${annonce.prix} €</div>
          </div>

          <div class="annonce-tags">
            <span class="tag">${annonce.categorie}</span>
            ${photos.length > 0 ? `<span class="tag">📷 ${photos.length} photo${photos.length > 1 ? 's' : ''}</span>` : ''}
          </div>

          <div class="vendeur-card" onclick="contacterVendeur()">
            <div class="vendeur-avatar">${annonce.vendeur.charAt(0).toUpperCase()}</div>
            <div>
              <div class="vendeur-nom">${annonce.vendeur}</div>
              <div class="vendeur-note">⭐ 5.0 · Contacter le vendeur</div>
            </div>
            <span style="color:#ccc;font-size:18px;">›</span>
          </div>

          ${annonce.description ? `
            <div class="section-titre">Description</div>
            <div class="annonce-desc">${annonce.description}</div>
          ` : ''}

          <div class="infos-grid">
            <div class="info-item">
              <div class="info-label">Catégorie</div>
              <div class="info-val">${annonce.categorie}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Vendeur</div>
              <div class="info-val">${annonce.vendeur}</div>
            </div>
            <div class="info-item">
              <div class="info-label">Prix</div>
              <div class="info-val">${annonce.prix} €</div>
            </div>
            <div class="info-item">
              <div class="info-label">Publié le</div>
              <div class="info-val">${new Date(annonce.created_at).toLocaleDateString('fr-FR')}</div>
            </div>
          </div>

          ${estVendeur ? `
            <div class="section-titre">Offres reçues</div>
            <div id="offres-container">Chargement...</div>
          ` : ''}

          ${!estVendeur ? `
            <button class="btn-signaler" onclick="ouvrirSignalement()">
              🚨 Signaler cette annonce
            </button>
          ` : ''}
        </div>

        <div class="action-bar">
          ${estVendeur
            ? `<button class="btn-offre" onclick="contacterVendeur()">💬 Messages</button>
               <button class="btn-acheter" onclick="afficherToast('✅ Annonce active !')">Mon annonce</button>`
            : `<button class="btn-offre" onclick="ouvrirOffre()">Faire une offre</button>
               <button class="btn-acheter" onclick="acheter()">Acheter · ${annonce.prix} €</button>`
          }
        </div>
      `
    }

    function changerPhoto(direction) {
      photoIndex = (photoIndex + direction + photos.length) % photos.length
      const track = document.getElementById('carousel-track')
      if (track) track.style.transform = `translateX(-${photoIndex * 100}%)`
      const dots = document.querySelectorAll('.dot')
      dots.forEach((d, i) => d.classList.toggle('active', i === photoIndex))
      const count = document.getElementById('carousel-count')
      if (count) count.textContent = `${photoIndex + 1} / ${photos.length}`
    }

    async function verifierFavori() {
      if (!monPrenom) return false
      const { data } = await db.from('favoris')
        .select('id').eq('utilisateur', monPrenom).eq('annonce_id', annonce.id)
      return data && data.length > 0
    }

    async function toggleFavori() {
      if (!monPrenom) { afficherToast('⚠️ Connecte-toi pour ajouter aux favoris !'); return }
      const btn = document.getElementById('btn-fav')
      const { data: existants } = await db.from('favoris')
        .select('id').eq('utilisateur', monPrenom).eq('annonce_id', annonce.id)
      if (existants && existants.length > 0) {
        await db.from('favoris').delete().eq('id', existants[0].id)
        btn.textContent = '🤍'
        afficherToast('Retiré des favoris')
      } else {
        await db.from('favoris').insert([{
          utilisateur: monPrenom, annonce_id: annonce.id,
          annonce_titre: annonce.titre, annonce_prix: annonce.prix,
          annonce_photo: photos[0] || null, annonce_emoji: annonce.emoji || null,
          annonce_vendeur: annonce.vendeur, annonce_categorie: annonce.categorie
        }])
        btn.textContent = '❤️'
        afficherToast('❤️ Ajouté aux favoris !')
      }
    }

    async function chargerOffres() {
      const { data } = await db.from('offres')
        .select('*').eq('annonce_id', annonce.id)
        .order('created_at', { ascending: false })
      const container = document.getElementById('offres-container')
      if (!container) return
      if (!data || data.length === 0) {
        container.innerHTML = '<div style="color:#999;font-size:13px;padding:8px 0;">Aucune offre reçue pour le moment</div>'
        return
      }
      container.innerHTML = `
        <div class="offres-recues">
          ${data.map(o => `
            <div class="offre-item" id="offre-${o.id}">
              <div class="offre-info">
                <div class="offre-acheteur">${o.acheteur}</div>
                <div class="offre-prix">${o.prix_propose} €
                  <span style="font-size:12px;color:#999;font-weight:400;">(prix : ${o.prix_original} €)</span>
                </div>
                ${o.statut === 'en attente' ? `
                  <div class="offre-actions">
                    <button class="btn-accepter" onclick="repondreOffre('${o.id}','accepte')">✅ Accepter</button>
                    <button class="btn-refuser" onclick="repondreOffre('${o.id}','refuse')">❌ Refuser</button>
                  </div>` : ''}
              </div>
              <span class="offre-statut ${
                o.statut === 'en attente' ? 'statut-attente' :
                o.statut === 'accepte' ? 'statut-accepte' : 'statut-refuse'}">
                ${o.statut === 'en attente' ? '⏳ En attente' :
                  o.statut === 'accepte' ? '✅ Acceptée' : '❌ Refusée'}
              </span>
            </div>
          `).join('')}
        </div>`
    }

    async function repondreOffre(offreId, statut) {
  const { data: offre } = await db.from('offres').select('*').eq('id', offreId).single()
  await db.from('offres').update({ statut }).eq('id', offreId)
  afficherToast(statut === 'accepte' ? '✅ Offre acceptée !' : '❌ Offre refusée')
  chargerOffres()

  try {
    const { data: emailData } = await db.rpc('get_user_email', {
      prenom_utilisateur: offre.acheteur
    })
    if (emailData && offre) {
      await fetch('https://milpcxrfvufgqyukjyep.supabase.co/functions/v1/swift-action', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',

    async function envoyerOffre() {

  if (!prixPropose || prixPropose <= 0) { afficherToast('⚠️ Entre un prix valide !'); return }

  const btn = document.getElementById('btn-offre')
  btn.disabled = true
  btn.textContent = 'Envoi...'

  const { error } = await db.from('offres').insert([{
    annonce_id: annonce.id, annonce_titre: annonce.titre,
    acheteur: monPrenom, vendeur: annonce.vendeur,
    prix_propose: prixPropose, prix_original: annonce.prix, statut: 'en attente'
  }])

  btn.disabled = false
  btn.textContent = 'Envoyer mon offre →'
  if (error) { afficherToast('❌ Erreur lors de l\'envoi'); return }

  document.getElementById('modal-offre').classList.remove('open')

        },
        body: JSON.stringify({
          destinataire: emailData,
          type: 'offre',

    function ouvrirSignalement() {
      if (!monPrenom) {
        afficherToast('⚠️ Connecte-toi pour signaler une annonce !')
        return
      }
      raisonSelectionnee = null
      document.querySelectorAll('.raison-btn').forEach(b => b.classList.remove('selected'))
      document.getElementById('signal-desc').value = ''
      document.getElementById('modal-signal').classList.add('open')
    }

    function selectionnerRaison(btn, raison) {
      document.querySelectorAll('.raison-btn').forEach(b => b.classList.remove('selected'))
      btn.classList.add('selected')
      raisonSelectionnee = raison
    }

    async function envoyerSignalement() {
      if (!raisonSelectionnee) {
        afficherToast('⚠️ Choisis une raison !')
        return
      }
      const description = document.getElementById('signal-desc').value.trim()
      const btn = document.getElementById('btn-signal')
      btn.disabled = true
      btn.textContent = 'Envoi...'

      const { error } = await db.from('signalements').insert([{
        type: 'annonce',
        cible_id: annonce.id,
        cible_titre: annonce.titre,
        signaleur: monPrenom,
        raison: raisonSelectionnee,
        description: description || null,
        statut: 'en attente'
      }])

      btn.disabled = false
      btn.textContent = '🚨 Envoyer le signalement'

      if (error) { afficherToast('❌ Erreur lors du signalement'); return }

      document.getElementById('modal-signal').classList.remove('open')
      afficherToast('✅ Signalement envoyé, merci !')
    }

    function acheter() {
      if (!monPrenom) { afficherToast('⚠️ Connecte-toi pour acheter !'); return }
      afficherToast('💳 Paiement bientôt disponible !')
    }

    function contacterVendeur() {
      if (!monPrenom) { afficherToast('⚠️ Connecte-toi pour envoyer un message !'); return }
      const params = new URLSearchParams({ autre: annonce.vendeur, titre: annonce.titre, id: annonce.id })
      window.location.href = 'messages.html?' + params.toString()
    }

    function fermerModal(e, id) {
      if (e.target === document.getElementById(id)) {
        document.getElementById(id).classList.remove('open')
      }
    }

    function afficherToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.className = 'toast show'
      setTimeout(() => t.className = 'toast', 2600)
    }

    init()
  </script>
