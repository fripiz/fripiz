<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fripiz – Connexion</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #F7F5F2;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #eee;
    }
    .logo { font-size: 24px; font-weight: 700; color: #FF5C35; }
    .logo span { color: #1A1A1A; }
    .btn-retour {
      background: none; border: none;
      font-size: 22px; cursor: pointer;
    }
    .container {
      flex: 1;
      padding: 40px 24px;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }
    .tabs {
      display: flex;
      background: white;
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 24px;
      border: 1px solid #eee;
    }
    .tab {
      flex: 1; padding: 10px;
      background: none; border: none;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; color: #999;
      transition: all 0.2s;
    }
    .tab.active {
      background: #FF5C35;
      color: white;
    }
    .form-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #eee;
    }
    .form-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .form-subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 12px; color: #999;
      margin-bottom: 6px; display: block;
      font-weight: 500;
    }
    .form-input {
      width: 100%;
      border: 1.5px solid #eee;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-family: 'Segoe UI', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      background: #FAFAFA;
    }
    .form-input:focus { border-color: #FF5C35; background: white; }
    .btn-submit {
      width: 100%;
      background: #FF5C35;
      color: white; border: none;
      border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-submit:disabled {
      opacity: 0.6; cursor: not-allowed;
    }
    .message {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    .message.success {
      background: #E8F8EE;
      color: #1A7A40;
      display: block;
    }
    .message.error {
      background: #FEE8E8;
      color: #C0392B;
      display: block;
    }
    .divider {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 40%;
      height: 1px; background: #eee;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>

  <header>
    <button class="btn-retour" onclick="window.location.href='index.html'">←</button>
    <div class="logo">Frip<span>iz</span></div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab active" id="tab-connexion" onclick="afficherOnglet('connexion')">
        Se connecter
      </button>
      <button class="tab" id="tab-inscription" onclick="afficherOnglet('inscription')">
        S'inscrire
      </button>
    </div>

    <!-- CONNEXION -->
    <div id="form-connexion" class="form-card">
      <div class="form-title">Bon retour ! 👋</div>
      <div class="form-subtitle">Connecte-toi pour accéder à ton compte</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="login-email" type="email" placeholder="ton@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" id="login-password" type="password" placeholder="••••••••" />
      </div>
      <button class="btn-submit" id="btn-login" onclick="seConnecter()">
        Se connecter →
      </button>
      <div class="message" id="msg-login"></div>
    </div>

    <!-- INSCRIPTION -->
    <div id="form-inscription" class="form-card" style="display:none;">
      <div class="form-title">Rejoins Fripiz ! 🎉</div>
      <div class="form-subtitle">Crée ton compte gratuitement en 30 secondes</div>
      <div class="form-group">
        <label class="form-label">Prénom</label>
        <input class="form-input" id="signup-prenom" type="text" placeholder="Ex : Jules" />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="signup-email" type="email" placeholder="ton@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" id="signup-password" type="password"
          placeholder="minimum 6 caractères" />
      </div>
      <button class="btn-submit" id="btn-signup" onclick="sInscrire()">
        Créer mon compte →
      </button>
      <div class="message" id="msg-signup"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://milpcxrfvufgqyukjyep.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbHBjeHJmdnVmZ3F5dWtqeWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODk3NzgsImV4cCI6MjA5MjI2NTc3OH0.TUh3kxzmjlQX38naPqQvJ6hpyNzPbi1fUoILuXKDZ9Q'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    function afficherOnglet(onglet) {
      document.getElementById('form-connexion').style.display =
        onglet === 'connexion' ? 'block' : 'none'
      document.getElementById('form-inscription').style.display =
        onglet === 'inscription' ? 'block' : 'none'
      document.getElementById('tab-connexion').classList.toggle('active', onglet === 'connexion')
      document.getElementById('tab-inscription').classList.toggle('active', onglet === 'inscription')
    }

    async function seConnecter() {
      const email = document.getElementById('login-email').value.trim()
      const password = document.getElementById('login-password').value
      const btn = document.getElementById('btn-login')
      const msg = document.getElementById('msg-login')

      if (!email || !password) {
        msg.textContent = '⚠️ Remplis tous les champs'
        msg.className = 'message error'
        return
      }

      btn.disabled = true
      btn.textContent = 'Connexion...'

      const { error } = await db.auth.signInWithPassword({ email, password })

      if (error) {
        msg.textContent = '❌ Email ou mot de passe incorrect'
        msg.className = 'message error'
        btn.disabled = false
        btn.textContent = 'Se connecter →'
        return
      }

      msg.textContent = '✅ Connecté ! Redirection...'
      msg.className = 'message success'
      setTimeout(() => window.location.href = 'index.html', 1000)
    }

    async function sInscrire() {
      const prenom = document.getElementById('signup-prenom').value.trim()
      const email = document.getElementById('signup-email').value.trim()
      const password = document.getElementById('signup-password').value
      const btn = document.getElementById('btn-signup')
      const msg = document.getElementById('msg-signup')

      if (!prenom || !email || !password) {
        msg.textContent = '⚠️ Remplis tous les champs'
        msg.className = 'message error'
        return
      }

      if (password.length < 6) {
        msg.textContent = '⚠️ Le mot de passe doit faire au moins 6 caractères'
        msg.className = 'message error'
        return
      }

      btn.disabled = true
      btn.textContent = 'Création du compte...'

      const { error } = await db.auth.signUp({
        email,
        password,
        options: { data: { prenom } }
      })

      if (error) {
        msg.textContent = '❌ Erreur : ' + error.message
        msg.className = 'message error'
        btn.disabled = false
        btn.textContent = 'Créer mon compte →'
        return
      }

      msg.textContent = '✅ Compte créé ! Vérifie ton email pour confirmer.'
      msg.className = 'message success'
      btn.textContent = 'Compte créé !'
    }
  </script>

</body>
</html>
