<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fripiz</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F7F5F2; color: #1A1A1A; }
    header {
      background: white; padding: 16px 20px;
      display: flex; align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 24px; font-weight: 700; color: #FF5C35; }
    .logo span { color: #1A1A1A; }
    .btn-connexion {
      background: none; border: 1.5px solid #FF5C35;
      color: #FF5C35; padding: 8px 18px;
      border-radius: 20px; font-size: 14px; cursor: pointer;
    }
    .hero { text-align: center; padding: 40px 20px 30px; }
    .hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; line-height: 1.3; }
    .hero h1 span { color: #FF5C35; }
    .hero p { font-size: 15px; color: #666; margin-bottom: 20px; }
    .btn-vendre {
      background: #FF5C35; color: white; border: none;
      padding: 14px 32px; border-radius: 30px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .search { padding: 0 20px 20px; }
    .search input {
      width: 100%; padding: 12px 20px;
      border-radius: 14px; border: 1px solid #ddd;
      font-size: 15px; background: white; outline: none;
    }
    .categories {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 0 20px 16px; scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    .cat {
      background: white; border: 1px solid #ddd;
      border-radius: 20px; padding: 8px 16px;
      font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    .cat.active { background: #FF5C35; color: white; border-color: #FF5C35; }
    .section-title { font-size: 18px; font-weight: 700; padding: 0 20px 12px; }
    .grille {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; padding: 0 12px 100px;
    }
    .article {
      background: white; border-radius: 14px;
      overflow: hidden; border: 1px solid #eee;
    }
    .article-img {
      width: 100%; aspect-ratio: 1; background: #F0EDE8;
      display: flex; align-items: center;
      justify-content: center; font-size: 52px;
      overflow: hidden; position: relative;
    }
    .article-img img { width: 100%; height: 100%; object-fit: cover; }
    .btn-fav {
      position: absolute; top: 8px; right: 8px;
      background: rgba(255,255,255,0.9);
      border: none; border-radius: 50%;
      width: 32px; height: 32px; font-size: 16px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .nb-photos {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.5); color: white;
      font-size: 10px; padding: 2px 6px; border-radius: 10px;
    }
    .article-info { padding: 10px 12px; }
    .article-nom { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .article-taille { font-size: 11px; color: #999; margin-bottom: 6px; }
    .article-prix { font-size: 16px; font-weight: 700; }
    .btn-contacter {
      margin-top: 8px; width: 100%;
      background: #FFF0ED; color: #FF5C35;
      border: none; border-radius: 8px;
      padding: 7px; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }
    .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 500px;
      padding: 20px 20px 40px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px; background: #E0E0E0;
      border-radius: 2px; margin: 0 auto 16px;
    }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12px; color: #999; margin-bottom: 4px; display: block; }
    .form-input {
      width: 100%; border: 1px solid #ddd; border-radius: 10px;
      padding: 10px 12px; font-size: 14px; outline: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-input:focus { border-color: #FF5C35; }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }
    .form-select {
      width: 100%; border: 1px solid #ddd; border-radius: 10px;
      padding: 10px 12px; font-size: 14px; background: white; outline: none;
    }
    .photos-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 6px; margin-bottom: 12px;
    }
    .photo-case {
      aspect-ratio: 1; border-radius: 8px;
      border: 1.5px dashed #ddd;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden;
      position: relative; background: #FAFAFA;
      transition: border-color 0.15s;
    }
    .photo-case:hover { border-color: #FF5C35; }
    .photo-case.remplie { border: none; }
    .photo-case img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .photo-case .icone { font-size: 18px; }
    .photo-case .num { font-size: 9px; color: #ccc; margin-top: 2px; }
    .photo-case .btn-effacer {
      position: absolute; top: 2px; right: 2px;
      width: 18px; height: 18px;
      background: rgba(0,0,0,0.6); color: white;
      border: none; border-radius: 50%;
      font-size: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-case .btn-rotation {
      position: absolute; bottom: 2px; right: 2px;
      width: 18px; height: 18px;
      background: rgba(255,92,53,0.85); color: white;
      border: none; border-radius: 50%;
      font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-case.premiere { border-color: #FF5C35; }
    .photo-case.premiere .icone { color: #FF5C35; }
    .photos-hint {
      font-size: 11px; color: #999; text-align: center; margin-bottom: 8px;
    }
    .upload-progress {
      display: none; text-align: center;
      font-size: 13px; color: #FF5C35; margin-top: 8px;
    }
    .btn-publier {
      width: 100%; background: #FF5C35; color: white;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px;
    }
    .btn-publier:disabled { opacity: 0.6; cursor: not-allowed; }
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A; color: white;
      padding: 10px 20px; border-radius: 20px;
      font-size: 13px; display: none; z-index: 300;
      white-space: nowrap;
    }
    .toast.show { display: block; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #eee;
      display: flex; padding: 10px 0 20px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none;
      font-size: 10px; color: #999; cursor: pointer;
    }
    .nav-item.active { color: #FF5C35; }
    .nav-icon { font-size: 22px; }
    .nav-vendre {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
    }
    .nav-vendre .cercle {
      width: 48px; height: 48px; background: #FF5C35;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 26px; color: white; margin-top: -18px;
    }
    .nav-vendre span { font-size: 10px; color: #FF5C35; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Frip<span>iz</span></div>
    <button class="btn-connexion" id="btn-auth" onclick="window.location.href='auth.html'">Se connecter</button>
  </header>

  <div class="hero">
    <h1>Achète & vends<br><span>sans prise de tête</span></h1>
    <p>Vêtements, bibelots, chaussures...<br>Publie en 30 secondes.</p>
    <button class="btn-vendre" onclick="ouvrirModal()">Vendre un article</button>
  </div>

  <div class="search">
    <input type="text" placeholder="🔍  Rechercher un article..."
      oninput="rechercherAnnonces(this.value)" />
  </div>

  <div class="categories">
    <button class="cat active" onclick="filtrer(this, 'tout')">Tout</button>
    <button class="cat" onclick="filtrer(this, 'Femme')">Femme</button>
    <button class="cat" onclick="filtrer(this, 'Homme')">Homme</button>
    <button class="cat" onclick="filtrer(this, 'Enfant')">Enfant</button>
    <button class="cat" onclick="filtrer(this, 'Bibelots')">Bibelots</button>
    <button class="cat" onclick="filtrer(this, 'Sport')">Sport</button>
    <button class="cat" onclick="filtrer(this, 'Chaussures')">Chaussures</button>
  </div>

  <div class="section-title">Articles récents</div>
  <div class="grille" id="grille">
    <div class="loading">Chargement...</div>
  </div>

  <div class="modal-overlay" id="modal" onclick="fermerModal(event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Publier une annonce</div>

      <div class="form-group">
        <label class="form-label">Photos (10 max)</label>
        <p class="photos-hint">📷 Clique sur une case · ↻ Pour tourner · ✕ Pour supprimer</p>
        <div class="photos-grid" id="photos-grid"></div>
        <div class="upload-progress" id="upload-progress">Upload en cours...</div>
      </div>

      <div class="form-group">
        <label class="form-label">Titre</label>
        <input class="form-input" id="titre" placeholder="Ex : Veste en jean taille M" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Prix (€)</label>
          <input class="form-input" id="prix" type="number" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">Catégorie</label>
          <select class="form-select" id="categorie">
            <option>Femme</option>
            <option>Homme</option>
            <option>Enfant</option>
            <option>Bibelots</option>
            <option>Sport</option>
            <option>Chaussures</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" id="description" rows="3"
          placeholder="Décrivez votre article..."></textarea>
      </div>
      <button class="btn-publier" id="btn-publier" onclick="publierAnnonce()">
        Publier gratuitement →
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <button class="nav-item active">
      <span class="nav-icon">🏠</span><span>Accueil</span>
    </button>
    <button class="nav-item" onclick="window.location.href='messages.html'">
      <span class="nav-icon">💬</span><span>Messages</span>
    </button>
    <button class="nav-vendre" onclick="ouvrirModal()">
      <div class="cercle">＋</div>
      <span>Vendre</span>
    </button>
    <button class="nav-item" onclick="window.location.href='favoris.html'">
      <span class="nav-icon">❤️</span><span>Favoris</span>
    </button>
    <button class="nav-item" onclick="window.location.href='profil.html'">
      <span class="nav-icon">👤</span><span>Profil</span>
    </button>
  </nav>

  <script>
    const SUPABASE_URL = 'https://milpcxrfvufgqyukjyep.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbHBjeHJmdnVmZ3F5dWtqeWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODk3NzgsImV4cCI6MjA5MjI2NTc3OH0.TUh3kxzmjlQX38naPqQvJ6hpyNzPbi1fUoILuXKDZ9Q'
    const CLOUDINARY_CLOUD = 'doq5uvqor'
    const CLOUDINARY_PRESET = 'fripiz'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    const emojis = {
      'Femme': '👗', 'Homme': '👔', 'Enfant': '🧒',
      'Bibelots': '🏺', 'Sport': '⚽', 'Chaussures': '👟'
    }

    let toutesLesAnnonces = []
    const MAX_PHOTOS = 10
    let photos = new Array(MAX_PHOTOS).fill(null)

    function initGrille() {
      const grid = document.getElementById('photos-grid')
      grid.innerHTML = ''
      for (let i = 0; i < MAX_PHOTOS; i++) {
        const div = document.createElement('div')
        div.className = 'photo-case' + (i === 0 && !photos[i] ? ' premiere' : '')
        div.id = 'case-' + i

        if (photos[i]) {
          div.classList.add('remplie')
          const rotation = photos[i].rotation || 0
          div.innerHTML = `
            <img src="${photos[i].preview}" alt="photo ${i+1}" id="img-${i}"
              style="transform:rotate(${rotation}deg);transition:transform 0.3s;" />
            <button class="btn-effacer"
              onclick="event.stopPropagation();effacerPhoto(${i})">✕</button>
            <button class="btn-rotation"
              onclick="event.stopPropagation();tournerPhoto(${i})">↻</button>
          `
        } else {
          div.onclick = () => selectionnerPhoto(i)
          div.innerHTML = `
            <span class="icone">📷</span>
            <span class="num">${i + 1}</span>
          `
        }
        grid.appendChild(div)
      }
    }

    function selectionnerPhoto(index) {
      const input = document.createElement('input')
      input.type = 'file'
      input.accept = 'image/*'
      input.onchange = (e) => {
        const file = e.target.files[0]
        if (!file) return
        const reader = new FileReader()
        reader.onload = ev => {
          photos[index] = { file, preview: ev.target.result, rotation: 0 }
          initGrille()
        }
        reader.readAsDataURL(file)
      }
      input.click()
    }

    function effacerPhoto(index) {
      photos[index] = null
      initGrille()
    }

    function tournerPhoto(index) {
      if (!photos[index]) return
      photos[index].rotation = ((photos[index].rotation || 0) + 90) % 360
      const img = document.getElementById('img-' + index)
      if (img) img.style.transform = `rotate(${photos[index].rotation}deg)`
    }

    async function uploadPhoto(photoObj) {
      return new Promise((resolve) => {
        const img = new Image()
        img.onload = () => {
          const canvas = document.createElement('canvas')
          const rotation = photoObj.rotation || 0
          if (rotation === 90 || rotation === 270) {
            canvas.width = img.height
            canvas.height = img.width
          } else {
            canvas.width = img.width
            canvas.height = img.height
          }
          const ctx = canvas.getContext('2d')
          ctx.translate(canvas.width / 2, canvas.height / 2)
          ctx.rotate((rotation * Math.PI) / 180)
          ctx.drawImage(img, -img.width / 2, -img.height / 2)
          canvas.toBlob(async (blob) => {
            const formData = new FormData()
            formData.append('file', blob, 'photo.jpg')
            formData.append('upload_preset', CLOUDINARY_PRESET)
            const res = await fetch(
              `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,
              { method: 'POST', body: formData }
            )
            const data = await res.json()
            resolve(data.secure_url)
          }, 'image/jpeg', 0.9)
        }
        img.src = photoObj.preview
      })
    }

    async function verifierConnexion() {
      const { data: { user } } = await db.auth.getUser()
      const btn = document.getElementById('btn-auth')
      if (user) {
        const prenom = user.user_metadata?.prenom || 'Mon compte'
        btn.textContent = '👤 ' + prenom
        btn.onclick = () => window.location.href = 'profil.html'
      } else {
        btn.textContent = 'Se connecter'
        btn.onclick = () => window.location.href = 'auth.html'
      }
    }

    async function chargerAnnonces() {
      const { data, error } = await db
        .from('Annonces').select('*')
        .order('created_at', { ascending: false })
      if (error) {
        document.getElementById('grille').innerHTML =
          '<div class="loading">Erreur de chargement 😕</div>'
        return
      }
      toutesLesAnnonces = data
      afficherAnnonces(data)
      chargerFavoris()
    }

    function afficherAnnonces(annonces) {
      const grille = document.getElementById('grille')
      if (annonces.length === 0) {
        grille.innerHTML = '<div class="loading">Aucune annonce pour le moment.<br>Sois le premier à vendre ! 🎉</div>'
        return
      }
      grille.innerHTML = annonces.map(a => {
        const premierephoto = (a.photos && a.photos.length > 0) ? a.photos[0] : a.photo
        const nbPhotos = (a.photos && a.photos.length > 0) ? a.photos.length : (a.photo ? 1 : 0)
        return `
        <div class="article" onclick="window.location.href='annonce.html?id=${a.id}'">
          <div class="article-img">
            ${premierephoto
              ? `<img src="${premierephoto}" alt="${a.titre}" />`
              : (a.emoji || emojis[a.categorie] || '📦')
            }
            <button class="btn-fav" id="fav-${a.id}"
              onclick="event.stopPropagation();toggleFavori('${a.id}','${a.titre}','${a.prix}','${premierephoto || ''}','${a.emoji || ''}','${a.vendeur}','${a.categorie}')">
              🤍
            </button>
            ${nbPhotos > 1 ? `<span class="nb-photos">📷 ${nbPhotos}</span>` : ''}
          </div>
          <div class="article-info">
            <div class="article-nom">${a.titre}</div>
            <div class="article-taille">${a.vendeur} · ${a.categorie}</div>
            <div class="article-prix">${a.prix} €</div>
            <button class="btn-contacter"
              onclick="event.stopPropagation();contacterVendeur('${a.vendeur}','${a.titre}','${a.id}')">
              💬 Contacter
            </button>
          </div>
        </div>`
      }).join('')
    }

    async function chargerFavoris() {
      const { data: { user } } = await db.auth.getUser()
      if (!user) return
      const prenom = user.user_metadata?.prenom || 'Moi'
      const { data } = await db.from('favoris').select('annonce_id').eq('utilisateur', prenom)
      if (data) {
        data.forEach(f => {
          const btn = document.getElementById('fav-' + f.annonce_id)
          if (btn) btn.textContent = '❤️'
        })
      }
    }

    async function toggleFavori(id, titre, prix, photo, emoji, vendeur, categorie) {
      const { data: { user } } = await db.auth.getUser()
      if (!user) { afficherToast('⚠️ Connecte-toi pour ajouter des favoris !'); return }
      const prenom = user.user_metadata?.prenom || 'Moi'
      const btn = document.getElementById('fav-' + id)
      const { data: existants } = await db.from('favoris')
        .select('id').eq('utilisateur', prenom).eq('annonce_id', id)
      if (existants && existants.length > 0) {
        await db.from('favoris').delete().eq('id', existants[0].id)
        btn.textContent = '🤍'
        afficherToast('Retiré des favoris')
      } else {
        await db.from('favoris').insert([{
          utilisateur: prenom, annonce_id: id,
          annonce_titre: titre, annonce_prix: parseFloat(prix),
          annonce_photo: photo || null, annonce_emoji: emoji || null,
          annonce_vendeur: vendeur, annonce_categorie: categorie
        }])
        btn.textContent = '❤️'
        afficherToast('❤️ Ajouté aux favoris !')
      }
    }

    function contacterVendeur(vendeur, titre, id) {
      const params = new URLSearchParams({ autre: vendeur, titre, id })
      window.location.href = 'messages.html?' + params.toString()
    }

    function filtrer(el, cat) {
      document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'))
      el.classList.add('active')
      const filtrees = cat === 'tout'
        ? toutesLesAnnonces
        : toutesLesAnnonces.filter(a => a.categorie === cat)
      afficherAnnonces(filtrees)
    }

    function rechercherAnnonces(q) {
      const filtrees = toutesLesAnnonces.filter(a =>
        a.titre.toLowerCase().includes(q.toLowerCase())
      )
      afficherAnnonces(filtrees)
    }

    async function publierAnnonce() {
      const titre = document.getElementById('titre').value.trim()
      const prix = document.getElementById('prix').value
      const categorie = document.getElementById('categorie').value
      const description = document.getElementById('description').value.trim()
      const btn = document.getElementById('btn-publier')

      const { data: { user } } = await db.auth.getUser()
      if (!user) {
        afficherToast('⚠️ Connecte-toi pour publier une annonce !')
        return
      }
      const vendeur = user.user_metadata?.prenom || user.email

      if (!titre || !prix) {
        afficherToast('⚠️ Remplis le titre et le prix !')
        return
      }

      btn.disabled = true
      btn.textContent = 'Publication...'

      const progress = document.getElementById('upload-progress')
      let photosUrls = []
      const photosARemplir = photos.filter(p => p !== null)

      if (photosARemplir.length > 0) {
        progress.style.display = 'block'
        for (let i = 0; i < photosARemplir.length; i++) {
          progress.textContent = `Upload des photos (${i+1}/${photosARemplir.length})...`
          const url = await uploadPhoto(photosARemplir[i])
          photosUrls.push(url)
        }
        progress.style.display = 'none'
      }

      const { error } = await db.from('Annonces').insert([{
        titre, prix: parseFloat(prix), categorie,
        description, vendeur,
        emoji: emojis[categorie],
        photo: photosUrls[0] || null,
        photos: photosUrls.length > 0 ? photosUrls : null
      }])

      btn.disabled = false
      btn.textContent = 'Publier gratuitement →'

      if (error) {
        afficherToast('❌ Erreur lors de la publication')
        return
      }

      afficherToast('✅ Annonce publiée !')
      document.getElementById('modal').classList.remove('open')
      document.getElementById('titre').value = ''
      document.getElementById('prix').value = ''
      document.getElementById('description').value = ''
      photos = new Array(MAX_PHOTOS).fill(null)
      initGrille()
      chargerAnnonces()
    }

    function ouvrirModal() {
      document.getElementById('modal').classList.add('open')
      initGrille()
    }

    function fermerModal(e) {
      if (e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open')
      }
    }

    function afficherToast(msg) {
      const t = document.getElementById('toast')
      t.textContent = msg
      t.className = 'toast show'
      setTimeout(() => t.className = 'toast', 2600)
    }

    verifierConnexion()
    chargerAnnonces()
  </script>

</body>
</html>
