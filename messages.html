<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fripiz – Messages</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #F7F5F2; color: #1A1A1A; }
    header {
      background: white; padding: 16px 20px;
      display: flex; align-items: center;
      gap: 12px; border-bottom: 1px solid #eee;
      position: sticky; top: 0; z-index: 100;
    }
    .btn-retour { background: none; border: none; font-size: 22px; cursor: pointer; }
    .page-title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }

    #vue-liste { display: block; }
    #vue-chat { display: none; }

    .conv-list { padding: 12px; padding-bottom: 100px; }
    .conv-item {
      background: white; border-radius: 14px;
      padding: 14px 16px; margin-bottom: 10px;
      border: 1px solid #eee; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
    }
    .conv-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: #FF5C35; color: white;
      display: flex; align-items: center;
      justify-content: center; font-size: 18px;
      font-weight: 700; flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-nom { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .conv-dernier {
      font-size: 12px; color: #999;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-time { font-size: 11px; color: #bbb; flex-shrink: 0; }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: #999; font-size: 14px; line-height: 2;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    .chat-messages {
      padding: 16px; padding-bottom: 120px;
      display: flex; flex-direction: column; gap: 10px;
      min-height: calc(100vh - 200px);
    }
    .msg {
      max-width: 75%; padding: 10px 14px;
      border-radius: 18px; font-size: 14px; line-height: 1.4;
    }
    .msg-recu {
      background: white; border: 1px solid #eee;
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
    }
    .msg-envoye {
      background: #FF5C35; color: white;
      border-radius: 18px 18px 4px 18px;
      align-self: flex-end;
    }
    .msg-time {
      font-size: 10px; opacity: 0.6;
      margin-top: 4px; display: block;
    }
    .msg-annonce-ref {
      background: #FFF0ED; border: 1px solid #FFD5C8;
      border-radius: 10px; padding: 8px 12px;
      font-size: 12px; color: #FF5C35;
      margin-bottom: 8px; align-self: center;
      text-align: center;
    }
    .msg-photo {
      max-width: 200px; border-radius: 12px;
      overflow: hidden; cursor: pointer;
    }
    .msg-photo img {
      width: 100%; height: auto;
      display: block; border-radius: 12px;
    }
    .photo-preview {
      display: none; padding: 8px 16px;
      background: white; border-top: 1px solid #eee;
      align-items: center; gap: 10px;
    }
    .photo-preview.visible { display: flex; }
    .photo-preview img {
      width: 60px; height: 60px;
      object-fit: cover; border-radius: 8px;
    }
    .photo-preview-info { flex: 1; font-size: 13px; color: #666; }
    .btn-annuler-photo {
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: #999;
    }
    .chat-input-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #eee;
      padding: 10px 16px 24px;
      display: flex; gap: 10px; align-items: center;
    }
    .btn-photo-msg {
      width: 42px; height: 42px;
      background: #F7F5F2; color: #666;
      border: 1px solid #eee; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1; border: 1.5px solid #eee;
      border-radius: 24px; padding: 10px 16px;
      font-size: 14px; outline: none;
      font-family: 'Segoe UI', sans-serif;
    }
    .chat-input:focus { border-color: #FF5C35; }
    .btn-envoyer {
      width: 42px; height: 42px;
      background: #FF5C35; color: white;
      border: none; border-radius: 50%;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 500;
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 95%; max-height: 95%;
      border-radius: 8px; object-fit: contain;
    }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: white;
      font-size: 30px; cursor: pointer;
    }
    .upload-indicator {
      text-align: center; font-size: 12px;
      color: #FF5C35; padding: 4px;
      display: none;
    }
    .upload-indicator.visible { display: block; }
    .raison-user-btn {
      padding: 12px 16px; background: #F7F5F2;
      border: 1.5px solid #eee; border-radius: 12px;
      font-size: 14px; cursor: pointer; text-align: left;
      font-family: 'Segoe UI', sans-serif; transition: all 0.15s;
      width: 100%;
    }
    .raison-user-btn:hover { border-color: #C0392B; background: #FEE8E8; color: #C0392B; }
    .raison-user-btn.selected { border-color: #C0392B; background: #FEE8E8; color: #C0392B; font-weight: 600; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #eee;
      display: flex; padding: 10px 0 20px;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none;
      font-size: 10px; color: #999; cursor: pointer;
    }
    .nav-item.active { color: #FF5C35; }
    .nav-icon { font-size: 22px; }
    .nav-vendre {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer;
    }
    .nav-vendre .cercle {
      width: 48px; height: 48px; background: #FF5C35;
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 26px; color: white; margin-top: -18px;
    }
    .nav-vendre span { font-size: 10px; color: #FF5C35; font-weight: 600; }
  </style>
</head>
<body>

  <!-- VUE LISTE -->
  <div id="vue-liste">
    <header>
      <button class="btn-retour" onclick="window.location.href='index.html'">←</button>
      <div class="page-title">Messages</div>
      <div style="width:32px"></div>
    </header>
    <div class="conv-list" id="conv-list">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        Chargement...
      </div>
    </div>
  </div>

  <!-- VUE CHAT -->
  <div id="vue-chat">
    <header>
      <button class="btn-retour" onclick="afficherListe()">←</button>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:700;" id="chat-nom"></div>
        <div style="font-size:12px;color:#999;" id="chat-annonce"></div>
      </div>
      <button onclick="ouvrirSignalementUser()"
        style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px;"
        title="Signaler cet utilisateur">🚨</button>
    </header>
    <div class="upload-indicator" id="upload-indicator">📤 Envoi de la photo...</div>
    <div class="photo-preview" id="photo-preview">
      <img id="preview-img" src="" alt="preview" />
      <div class="photo-preview-info">Photo prête à envoyer</div>
      <button class="btn-annuler-photo" onclick="annulerPhoto()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <button class="btn-photo-msg" onclick="selectionnerPhotoMsg()">📷</button>
      <input class="chat-input" id="msg-input"
        placeholder="Écrire un message..."
        onkeypress="if(event.key==='Enter') envoyerMessage()" />
      <button class="btn-envoyer" onclick="envoyerMessage()">➤</button>
    </div>
  </div>

  <!-- LIGHTBOX PHOTO -->
  <div class="lightbox" id="lightbox" onclick="fermerLightbox()">
    <button class="lightbox-close" onclick="fermerLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="photo" />
  </div>

  <!-- MODAL SIGNALEMENT UTILISATEUR -->
  <div class="lightbox" id="modal-signal-user"
    onclick="fermerSignalUser(event)"
    style="align-items:flex-end;">
    <div style="background:white;border-radius:20px 20px 0 0;width:100%;
      max-width:500px;padding:20px 20px 40px;max-height:90vh;overflow-y:auto;">
      <div style="width:36px;height:4px;background:#E0E0E0;border-radius:2px;margin:0 auto 16px;"></div>
      <div style="font-size:18px;font-weight:700;margin-bottom:6px;">🚨 Signaler cet utilisateur</div>
      <div style="font-size:13px;color:#999;margin-bottom:20px;">
        Aide-nous à maintenir Fripiz sûr pour tous
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
        <button class="raison-user-btn" onclick="selectionnerRaisonUser(this,'Contenu inapproprié')">
          🚫 Contenu inapproprié
        </button>
        <button class="raison-user-btn" onclick="selectionnerRaisonUser(this,'Harcèlement ou insultes')">
          😡 Harcèlement ou insultes
        </button>
        <button class="raison-user-btn" onclick="selectionnerRaisonUser(this,'Arnaque ou fraude')">
          💸 Arnaque ou fraude
        </button>
        <button class="raison-user-btn" onclick="selectionnerRaisonUser(this,'Spam ou publicité')">
          📢 Spam ou publicité
        </button>
        <button class="raison-user-btn" onclick="selectionnerRaisonUser(this,'Contenu illicite')">
          ⛔ Contenu illicite
        </button>
        <button class="raison-user-btn" onclick="selectionnerRaisonUser(this,'Autre')">
          ❓ Autre raison
        </button>
      </div>
      <textarea id="signal-user-desc"
        style="width:100%;border:1.5px solid #eee;border-radius:12px;
        padding:12px 16px;font-size:14px;outline:none;
        font-family:'Segoe UI',sans-serif;margin-bottom:12px;resize:none;"
        rows="3" placeholder="Description optionnelle..."></textarea>
      <button id="btn-envoyer-signal-user" onclick="envoyerSignalementUser()"
        style="width:100%;background:#C0392B;color:white;border:none;
        border-radius:12px;padding:14px;font-size:15px;font-weight:600;
        cursor:pointer;font-family:'Segoe UI',sans-serif;">
        🚨 Envoyer le signalement
      </button>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item" onclick="window.location.href='index.html'">
      <span class="nav-icon">🏠</span><span>Accueil</span>
    </button>
    <button class="nav-item active">
      <span class="nav-icon">💬</span><span>Messages</span>
    </button>
    <button class="nav-vendre" onclick="window.location.href='index.html'">
      <div class="cercle">＋</div>
      <span>Vendre</span>
    </button>
    <button class="nav-item" onclick="window.location.href='favoris.html'">
      <span class="nav-icon">❤️</span><span>Favoris</span>
    </button>
    <button class="nav-item" onclick="window.location.href='profil.html'">
      <span class="nav-icon">👤</span><span>Profil</span>
    </button>
  </nav>

  <script>
    const SUPABASE_URL = 'https://milpcxrfvufgqyukjyep.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pbHBjeHJmdnVmZ3F5dWtqeWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2ODk3NzgsImV4cCI6MjA5MjI2NTc3OH0.TUh3kxzmjlQX38naPqQvJ6hpyNzPbi1fUoILuXKDZ9Q'
    const CLOUDINARY_CLOUD = 'doq5uvqor'
    const CLOUDINARY_PRESET = 'fripiz'

    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_KEY)

    let monPrenom = 'Moi'
    let convActive = null
    let realtimeChannel = null
    let photoAEnvoyer = null
    let raisonUserSelectionnee = null

    async function init() {
      const { data: { user } } = await db.auth.getUser()
      if (user) monPrenom = user.user_metadata?.prenom || 'Moi'

      const params = new URLSearchParams(window.location.search)
      const autre = params.get('autre')
      const titre = params.get('titre')
      const id = params.get('id')

      if (autre) {
        ouvrirChat(autre, titre, id)
      } else {
        chargerConversations()
      }
    }

    async function chargerConversations() {
      const { data, error } = await db
        .from('messages')
        .select('*')
        .or(`expediteur.eq.${monPrenom},destinataire.eq.${monPrenom}`)
        .order('created_at', { ascending: false })

      if (error || !data || data.length === 0) {
        document.getElementById('conv-list').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">💬</div>
            Pas encore de messages<br>
            <small>Contacte un vendeur depuis une annonce !</small>
          </div>`
        return
      }

      const convMap = {}
      data.forEach(msg => {
        const autre = msg.expediteur === monPrenom ? msg.destinataire : msg.expediteur
        if (!convMap[autre]) convMap[autre] = { ...msg, autre }
      })

      document.getElementById('conv-list').innerHTML = Object.values(convMap).map(c => `
        <div class="conv-item" onclick="ouvrirChat('${c.autre}','${c.annonce_titre || ''}','')">
          <div class="conv-avatar">${c.autre.charAt(0).toUpperCase()}</div>
          <div class="conv-info">
            <div class="conv-nom">${c.autre}</div>
            <div class="conv-dernier">${c.photo_url ? '📷 Photo' : (c.contenu || '')}</div>
          </div>
          <div class="conv-time">${new Date(c.created_at).toLocaleDateString('fr-FR')}</div>
        </div>
      `).join('')
    }

    async function ouvrirChat(autre, annoncetitre, annonceid) {
      convActive = { autre, annoncetitre, annonceid }
      document.getElementById('vue-liste').style.display = 'none'
      document.getElementById('vue-chat').style.display = 'block'
      document.getElementById('bottom-nav').style.display = 'none'
      document.getElementById('chat-nom').textContent = autre
      document.getElementById('chat-annonce').textContent = annoncetitre || ''
      await chargerMessages()

      if (realtimeChannel) realtimeChannel.unsubscribe()
      realtimeChannel = db.channel('messages-' + autre)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' },
          () => chargerMessages())
        .subscribe()
    }

    async function chargerMessages() {
      const { data } = await db
        .from('messages')
        .select('*')
        .or(`and(expediteur.eq.${monPrenom},destinataire.eq.${convActive.autre}),and(expediteur.eq.${convActive.autre},destinataire.eq.${monPrenom})`)
        .order('created_at', { ascending: true })

      const container = document.getElementById('chat-messages')
      if (!data || data.length === 0) {
        container.innerHTML = `
          <div class="msg-annonce-ref">
            💬 Début de la conversation<br>
            <strong>${convActive.annoncetitre || ''}</strong>
          </div>`
        return
      }

      container.innerHTML = data.map(msg => {
        const estMoi = msg.expediteur === monPrenom
        const heure = new Date(msg.created_at).toLocaleTimeString('fr-FR', {
          hour: '2-digit', minute: '2-digit'
        })

        if (msg.photo_url) {
          return `
            <div class="msg ${estMoi ? 'msg-envoye' : 'msg-recu'}"
              style="padding:6px;background:${estMoi ? '#FF5C35' : 'white'};">
              <div class="msg-photo" onclick="ouvrirLightbox('${msg.photo_url}')">
                <img src="${msg.photo_url}" alt="photo" />
              </div>
              ${msg.contenu ? `<div style="margin-top:6px;font-size:13px;">${msg.contenu}</div>` : ''}
              <span class="msg-time">${heure}</span>
            </div>`
        }

        return `
          <div class="msg ${estMoi ? 'msg-envoye' : 'msg-recu'}">
            ${msg.contenu}
            <span class="msg-time">${heure}</span>
          </div>`
      }).join('')
      container.scrollTop = container.scrollHeight
    }

    function selectionnerPhotoMsg() {
      const input = document.createElement('input')
      input.type = 'file'
      input.accept = 'image/*'
      input.onchange = (e) => {
        const file = e.target.files[0]
        if (!file) return
        photoAEnvoyer = file
        const reader = new FileReader()
        reader.onload = ev => {
          document.getElementById('preview-img').src = ev.target.result
          document.getElementById('photo-preview').classList.add('visible')
        }
        reader.readAsDataURL(file)
      }
      input.click()
    }

    function annulerPhoto() {
      photoAEnvoyer = null
      document.getElementById('photo-preview').classList.remove('visible')
      document.getElementById('preview-img').src = ''
    }

    async function uploadPhotoMessage(file) {
      const formData = new FormData()
      formData.append('file', file)
      formData.append('upload_preset', CLOUDINARY_PRESET)
      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,
        { method: 'POST', body: formData }
      )
      const data = await res.json()
      return data.secure_url
    }

    async function envoyerMessage() {
      const input = document.getElementById('msg-input')
      const contenu = input.value.trim()
      if (!contenu && !photoAEnvoyer) return
      input.value = ''

      let photoUrl = null
      if (photoAEnvoyer) {
        document.getElementById('upload-indicator').classList.add('visible')
        photoUrl = await uploadPhotoMessage(photoAEnvoyer)
        document.getElementById('upload-indicator').classList.remove('visible')
        annulerPhoto()
      }

      await db.from('messages').insert([{
        contenu: contenu || null,
        expediteur: monPrenom,
        destinataire: convActive.autre,
        annonce_titre: convActive.annoncetitre || null,
        photo_url: photoUrl
      }])

      chargerMessages()

      try {
        const { data: emailData } = await db.rpc('get_user_email', {
          prenom_utilisateur: convActive.autre
        })
        if (emailData && contenu) {
          await fetch('https://milpcxrfvufgqyukjyep.supabase.co/functions/v1/swift-action', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify({
              destinataire: emailData,
              type: 'message',
              expediteur: monPrenom,
              details: {
                contenu: contenu || '📷 Photo',
                annonce: convActive.annoncetitre || ''
              }
            })
          })
        }
      } catch (e) {
        console.log('Email non envoyé:', e)
      }
    }

    function ouvrirLightbox(url) {
      document.getElementById('lightbox-img').src = url
      document.getElementById('lightbox').classList.add('open')
    }

    function fermerLightbox() {
      document.getElementById('lightbox').classList.remove('open')
    }

    function ouvrirSignalementUser() {
      raisonUserSelectionnee = null
      document.querySelectorAll('.raison-user-btn').forEach(b => b.classList.remove('selected'))
      document.getElementById('signal-user-desc').value = ''
      document.getElementById('modal-signal-user').classList.add('open')
    }

    function fermerSignalUser(e) {
      if (e.target === document.getElementById('modal-signal-user')) {
        document.getElementById('modal-signal-user').classList.remove('open')
      }
    }

    function selectionnerRaisonUser(btn, raison) {
      document.querySelectorAll('.raison-user-btn').forEach(b => b.classList.remove('selected'))
      btn.classList.add('selected')
      raisonUserSelectionnee = raison
    }

    async function envoyerSignalementUser() {
      if (!raisonUserSelectionnee) {
        alert('⚠️ Choisis une raison !')
        return
      }
      const description = document.getElementById('signal-user-desc').value.trim()
      const btn = document.getElementById('btn-envoyer-signal-user')
      btn.disabled = true
      btn.textContent = 'Envoi...'

      await db.from('signalements').insert([{
        type: 'compte',
        cible_id: convActive.autre,
        cible_titre: convActive.autre,
        signaleur: monPrenom,
        raison: raisonUserSelectionnee,
        description: description || null,
        statut: 'en attente'
      }])

      btn.disabled = false
      btn.textContent = '🚨 Envoyer le signalement'
      document.getElementById('modal-signal-user').classList.remove('open')
      alert('✅ Signalement envoyé ! Merci de nous aider à maintenir Fripiz sûr.')
    }

    function afficherListe() {
      document.getElementById('vue-liste').style.display = 'block'
      document.getElementById('vue-chat').style.display = 'none'
      document.getElementById('bottom-nav').style.display = 'flex'
      if (realtimeChannel) realtimeChannel.unsubscribe()
      chargerConversations()
    }

    init()
  </script>

</body>
</html>
